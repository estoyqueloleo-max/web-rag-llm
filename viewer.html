<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transcripción</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
        }
        header {
            background: #16213e;
            border-bottom: 1px solid #0f3460;
            padding: 14px 24px;
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        header a {
            color: #4f8ef7;
            text-decoration: none;
            font-size: 0.9em;
            white-space: nowrap;
        }
        header a:hover { text-decoration: underline; }
        #title {
            font-size: 1em;
            font-weight: 600;
            color: #aac4ff;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .container {
            max-width: 860px;
            margin: 32px auto;
            padding: 0 20px 60px;
        }
        .meta {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 8px;
            padding: 14px 18px;
            margin-bottom: 24px;
            font-size: 0.85em;
            color: #8899bb;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .meta span strong { color: #aac4ff; }
        #content {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 8px;
            padding: 28px 32px;
            font-size: 1rem;
            line-height: 1.85;
            white-space: pre-wrap;
            word-break: break-word;
            color: #dce8ff;
        }
        #loading {
            text-align: center;
            padding: 60px;
            color: #556;
            font-style: italic;
        }
        #error {
            background: #3d1515;
            border: 1px solid #7a2222;
            color: #ffaaaa;
            border-radius: 8px;
            padding: 20px;
            display: none;
        }
        /* Highlight de entidades si se pasa via ?entities= */
        mark.ent {
            background: #fff176;
            color: #111;
            border-radius: 3px;
            padding: 0 2px;
            font-weight: 600;
        }
    </style>
</head>
<body>
<header>
    <a href="index.html" id="back-btn">← Buscador</a>
    <div id="title">Cargando...</div>
</header>

<div class="container">
    <div class="meta" id="meta" style="display:none">
        <span><strong>Archivo:</strong> <span id="meta-file"></span></span>
        <span><strong>Tamaño:</strong> <span id="meta-size"></span></span>
    </div>
    <div id="error"></div>
    <div id="loading">Cargando transcripción...</div>
    <div id="content" style="display:none"></div>
</div>

<script>
(async () => {
    const params  = new URLSearchParams(location.search);
    const file    = params.get('file');        // nombre del .txt
    const rawEnts = params.get('entities');    // entidades separadas por |

    if (!file) {
        showError('No se especificó ningún fichero. Usa ?file=nombre.txt');
        return;
    }

    document.getElementById('title').textContent = decodeURIComponent(file);
    document.getElementById('meta-file').textContent = decodeURIComponent(file);

    try {
        const resp = await fetch(`transcripts/${file}`);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);

        // fetch() decodifica como UTF-8 por defecto → encoding correcto
        const text = await resp.text();

        document.getElementById('loading').style.display = 'none';
        document.getElementById('meta').style.display    = 'flex';

        const kb = (new TextEncoder().encode(text).length / 1024).toFixed(1);
        document.getElementById('meta-size').textContent = `${kb} KB · ${text.split(/\n/).length} líneas`;

        const contentEl = document.getElementById('content');
        contentEl.style.display = 'block';

        // Resaltar entidades si se pasaron como parámetro
        if (rawEnts) {
            const entities = rawEnts.split('|').filter(Boolean)
                .sort((a, b) => b.length - a.length);

            let html = escHtml(text);
            entities.forEach(ent => {
                const esc   = escHtml(ent);
                const regex = new RegExp(
                    `(${esc.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi'
                );
                html = html.replace(regex, '<mark class="ent">$1</mark>');
            });
            contentEl.innerHTML = html;
        } else {
            contentEl.textContent = text;
        }

    } catch (e) {
        showError(`Error al cargar el fichero: ${e.message}`);
    }
})();

function showError(msg) {
    document.getElementById('loading').style.display = 'none';
    const el = document.getElementById('error');
    el.textContent = msg;
    el.style.display = 'block';
}

function escHtml(str) {
    return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
}
</script>
</body>
</html>
